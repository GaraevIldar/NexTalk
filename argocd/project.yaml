apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: nextalk
  namespace: argocd
spec:
  description: NexTalk - real-time messaging platform
  # Allow ArgoCD to sync from any repo (change to specific URL in production)
  sourceRepos:
    - '*'
  destinations:
    - namespace: nextalk
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
