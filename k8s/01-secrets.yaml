# IMPORTANT: These are development defaults from .env.example.
# Replace all values before any non-local deployment.
# stringData is converted to base64 automatically by Kubernetes.
apiVersion: v1
kind: Secret
metadata:
  name: nextalk-secrets
  namespace: nextalk
type: Opaque
stringData:
  postgres-password: "postgres"
  postgres-user: "postgres"
  postgres-db: "nextalk"
  # Npgsql connection string for .NET services
  postgres-dsn-nextalk: "Host=postgres;Port=5432;Database=nextalk;Username=postgres;Password=postgres;SSL Mode=Disable"
  # libpq DSN for Zitadel (Go)
  postgres-dsn-zitadel: "postgres://postgres:postgres@postgres:5432/zitadel?sslmode=disable"
  livekit-api-key: "devkey"
  livekit-secret-key: "devsecret"
  # Must be exactly 32 characters
  zitadel-masterkey: "MasterkeyNeedsToHave32Characters"
  grafana-admin-user: "admin"
  grafana-admin-password: "admin"
